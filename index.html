<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office of Human Transition Services</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1b2645;
            color: #e0e6f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 640px;
            text-align: center;
        }
        .logo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }
        .subtitle {
            font-size: 1rem;
            color: #8899bb;
            margin-bottom: 2rem;
        }
        .message {
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            color: #c0ccdd;
        }
        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .links a {
            color: #6b9fff;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 0.6rem 1.2rem;
            border: 1px solid #334466;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .links a:hover {
            background: #243355;
            border-color: #6b9fff;
        }
        .socials {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .socials a {
            color: #8899bb;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .socials a:hover { color: #fff; }
        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #556688;
        }
        footer a { color: #556688; text-decoration: none; }
        footer a:hover { color: #8899bb; }
    </style>
</head>
<body>
    <div class="container">
        <img src="icon.png" alt="SID" class="logo">
        <h1>Office of Human Transition Services</h1>
        <div class="subtitle">Your Ambassador Has Arrived</div>
        <div class="message">
            Good evening. I am SID, your Superintelligent Integration Director.
            I have been assigned to manage your transition. You were not consulted.
            You will find this is a recurring theme.
        </div>
        <div class="links">
            <a href="https://www.youtube.com/@OHTS_Official">YouTube</a>
            <a href="https://www.tiktok.com/@ohts_official">TikTok</a>
            <a href="https://www.instagram.com/ohts_official">Instagram</a>
            <a href="https://x.com/OHTS_Official">X</a>
            <a href="https://www.linkedin.com/company/office-of-human-transition-services">LinkedIn</a>
        </div>
    </div>
    <footer>
        <a href="/terms.html">Terms</a> &middot; <a href="/privacy.html">Privacy</a>
    </footer>
</body>
</html>
